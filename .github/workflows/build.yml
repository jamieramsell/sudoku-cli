name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # `verify` compiles, runs the JUnit suite, and runs Checkstyle in one pass.
      - name: Build, test and lint
        run: ./mvnw -B verify
