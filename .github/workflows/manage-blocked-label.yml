name: Manage blocked label

# Adds the "blocked" label to any open issue that has at least one OPEN
# blocking dependency, and removes it once all blockers are closed.
#
# Note: GitHub does NOT expose the `issue_dependencies` webhook as an Actions
# trigger, so adding/removing a dependency does not fire a workflow on its own.
# The issues.closed / issues.reopened triggers handle clearing/re-applying the
# label when a blocker's state changes, and the scheduled sweep catches newly
# added/removed dependencies (and any missed events). Run it on demand via the
# "Run workflow" button (workflow_dispatch) at any time.

on:
  issues:
    types: [opened, reopened, closed]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: blocked-label-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  manage-blocked-label:
    runs-on: ubuntu-latest
    steps:
      - name: Sync blocked labels
        uses: actions/github-script@v7
        with:
          script: |
            const LABEL = "blocked";
            const { owner, repo } = context.repo;

            // Create the label on first use so the repo doesn't need manual setup.
            async function ensureLabelExists() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: LABEL });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo, name: LABEL,
                    color: "B60205",
                    description: "Blocked by an open dependency",
                  });
                  core.info(`Created '${LABEL}' label.`);
                } else {
                  throw e;
                }
              }
            }

            // Number of OPEN issues that block the given issue.
            async function openBlockerCount(issue_number) {
              const blockers = await github.paginate(
                "GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocked_by",
                { owner, repo, issue_number, per_page: 100 }
              );
              return blockers.filter((b) => b.state === "open").length;
            }

            // Issues that the given issue blocks (its dependents).
            async function blockingNumbers(issue_number) {
              const blocking = await github.paginate(
                "GET /repos/{owner}/{repo}/issues/{issue_number}/dependencies/blocking",
                { owner, repo, issue_number, per_page: 100 }
              );
              return blocking.map((b) => b.number);
            }

            // Raw label removal; ignores the 404 when the label isn't applied.
            async function dropLabel(issue_number) {
              await github.rest.issues
                .removeLabel({ owner, repo, issue_number, name: LABEL })
                .catch((e) => { if (e.status !== 404) throw e; });
            }

            // Add or remove the label on a single issue to match its blocker state.
            async function syncIssue(issue_number) {
              const { data: issue } = await github.rest.issues.get({
                owner, repo, issue_number,
              });
              // Only label open issues; never touch closed ones.
              if (issue.state !== "open") return;

              const hasLabel = (issue.labels || []).some(
                (l) => (typeof l === "string" ? l : l.name) === LABEL
              );
              const blockers = await openBlockerCount(issue_number);

              if (blockers > 0 && !hasLabel) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: [LABEL],
                });
                core.info(`#${issue_number}: added '${LABEL}' (${blockers} open blocker(s)).`);
              } else if (blockers === 0 && hasLabel) {
                await dropLabel(issue_number);
                core.info(`#${issue_number}: removed '${LABEL}' (no open blockers).`);
              }
            }

            await ensureLabelExists();

            // Decide which issues to (re)evaluate based on what triggered the run.
            const toEval = new Set();

            if (context.eventName === "issues") {
              const action = context.payload.action;
              const n = context.payload.issue.number;
              if (action === "closed") {
                // A closed issue shouldn't keep the 'blocked' label. The closed
                // event payload carries the issue's current labels, so no fetch.
                const hadLabel = (context.payload.issue.labels || []).some(
                  (l) => (typeof l === "string" ? l : l.name) === LABEL
                );
                if (hadLabel) {
                  await dropLabel(n);
                  core.info(`#${n}: removed '${LABEL}' (issue closed).`);
                }
                // No longer a blocker: re-check everything it was blocking.
                for (const d of await blockingNumbers(n)) toEval.add(d);
              } else if (action === "reopened") {
                // May itself be blocked, and re-blocks its dependents.
                toEval.add(n);
                for (const d of await blockingNumbers(n)) toEval.add(d);
              } else {
                // opened
                toEval.add(n);
              }
            } else {
              // schedule / workflow_dispatch: full sweep of open issues.
              const open = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: "open", per_page: 100,
              });
              for (const i of open) {
                if (!i.pull_request) toEval.add(i.number); // exclude PRs
              }
            }

            for (const issue_number of toEval) {
              await syncIssue(issue_number);
            }

            core.info(`Evaluated ${toEval.size} issue(s).`);
